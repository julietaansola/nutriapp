databases:
  - name: nutriapp-db
    plan: free
    databaseName: nutriapp
    user: nutriapp

services:
  # Backend API
  - type: web
    name: nutriapp-api
    plan: free
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npx tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nutriapp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

  # Frontend Static Site
  - type: web
    name: nutriapp-frontend
    plan: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://nutriapp-api.onrender.com
