databases:
  - name: nutriapp-db
    plan: free
    databaseName: nutriapp
    user: nutriapp

services:
  - type: web
    name: nutriapp-api
    plan: free
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx tsx src/seed.ts
    startCommand: npx tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nutriapp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
